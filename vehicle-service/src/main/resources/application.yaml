server:
  port: 8084

spring:
  application:
    name: vehicle-service

  datasource:
    url: jdbc:mysql://localhost:3306/Master_db
    username: root
    password: root   # change if needed

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: false

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka 
        