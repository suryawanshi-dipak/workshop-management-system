# Server Configuration
server.port=8083

# Application name — this is how it appears in Eureka dashboard
spring.application.name=customer-service

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/workshop_customer?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Eureka — register with discovery server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.workshop.customer=DEBUG